            text-shadow: 0 2px 4px rgba(0,0,0,0.5);

        }

            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(155, 89, 182, 0.4);
        }

            min-height: 150px;
            margin: 20px 0;
            font-size: 36px;
            font-weight: bold;

            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 12, 30, 0.9);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 2px solid #9b59b6;
        }

        .lyrics-box.warning-active {
            border: 3px dashed #fd79a8;
            background: rgba(253, 121, 168, 0.15);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(253, 121, 168, 0.3); }
            100% { transform: scale(1.02); box-shadow: 0 0 25px rgba(253, 121, 168, 0.8); }

            color: #fd79a8;
            margin-right: 15px;
            display: none;
        }

        .lyrics-box.warning-active .warning-icon {

        }

        function parseTimeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.toString().split(':');
            if (parts.length === 2) {
                return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
            }
            return parseFloat(timeStr) || 0;
        }

        function playWarningBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                console.log("音訊未允許");
            }
        }

                    lyricsDisplay.innerText = firstLineText.replace('[', '').replace(']', '');
                }

                document.getElementById('playing-title').innerText = `🎵 挑戰歌曲：${currentSong.title}`;
                centerSongDisplay.innerText = `🎤 當前挑戰：${currentSong.title}`;
                document.getElementById('setup-zone').style.display = 'none';
                document.getElementById('game-zone').style.display = 'block';
                controlDashboard.style.display = 'block';

                const startSec = parseTimeToSeconds(currentSong.startTime);
                audio.src = currentSong.onlineMusicUrl;
                audio.load();

                audio.onerror = function() {
                    lyricsDisplay.style.fontSize = "22px";
                    lyricsDisplay.style.color = "#ff7675";
                    lyricsDisplay.innerText = "❌ 線上音樂下載出錯！請檢查網際網路狀態與網址權限！";
                };

                audio.onloadedmetadata = function() {
                    lyricsDisplay.style.fontSize = "36px";
                    lyricsDisplay.style.color = "#ff8c00"; 
                    audio.currentTime = startSec;
                    currentSecondsSpan.innerText = startSec.toFixed(1);
                    audio.play().then(() => {
                        audio.currentTime = startSec;
                    }).catch(error => {
                        lyricsDisplay.innerText = "🔊 瀏覽器阻擋自動播放！請點選右下角導播台的 ▶️ 鍵開始挑戰！";
                    });
                };
            }, 3500);
        }

        audio.addEventListener('timeupdate', () => {
            if (!currentSong || isFinished || isWaitingResume || isQuizActive) return;
            const currentTime = audio.currentTime;
            currentSecondsSpan.innerText = currentTime.toFixed(1);
            
            const endSec = parseTimeToSeconds(currentSong.endTime);
            if (currentTime >= endSec) {
                audio.pause();
                isFinished = true;
                lyricsBox.classList.remove('warning-active');
                
                statusMsg.style.color = "#1565c0"; 
                lyricsDisplay.innerText = "🏁 本首歌曲挑戰結束！";
                statusMsg.innerHTML = "請重新整理網頁挑戰其他歌曲。";
                return;
            }

            const lines = currentSong.lyrics;
            let foundIndex = -1;
            for (let i = 0; i < lines.length; i++) {
                if (currentTime >= lines[i].time) {
                    foundIndex = i;
                }
            }

            if (foundIndex !== -1 && currentLineIndex !== foundIndex) {
                currentLineIndex = foundIndex;
                checkAndShowLyrics(lines[currentLineIndex], foundIndex);
            }
        });

        function checkAndShowLyrics(lineData, index) {
            const lines = currentSong.lyrics;
            const rawText = lineData.text;
            const match = rawText.match(/\[(.*?)\]/);
            
            let isIncomingQuiz = false;
            if (index + 1 < lines.length && lines[index + 1].text.includes('[') && !answeredLines.has(index + 1)) isIncomingQuiz = true;
            if (index + 2 < lines.length && lines[index + 2].text.includes('[') && !answeredLines.has(index + 2)) isIncomingQuiz = true;

            if (isIncomingQuiz) {
                if (!lyricsBox.classList.contains('warning-active')) {
                    lyricsBox.classList.add('warning-active');
                    playWarningBeep();
                }
            } else {
                lyricsBox.classList.remove('warning-active');
            }

            if (match && !answeredLines.has(index)) {
                isQuizActive = true;
                audio.pause();
                lyricsBox.classList.remove('warning-active');
                
                const quizKey = match[1];
                const os = "O".repeat(quizKey.length);
                const hiddenText = rawText.replace(`[${quizKey}]`, os);
                
                lyricsDisplay.innerText = hiddenText;
                quizHint.innerHTML = `⚠️ 歌聲暫停！請填出上方 <b>${quizKey.length}</b> 個字的歌詞！`;
                inputZone.style.display = 'block';
                userAnswer.value = "";
                userAnswer.disabled = false;
                submitBtn.disabled = false;
                
                lineData.computedKey = quizKey;
                lineData.cleanText = rawText.replace('[', '').replace(']', '');
                answeredLines.add(index);
                
                setTimeout(() => {
                    userAnswer.focus();
                }, 50);
            } else {
                lyricsDisplay.innerText = rawText.replace('[', '').replace(']', '');
            }
        }

        document.getElementById('submit-btn').addEventListener('click', checkAnswer);
        userAnswer.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        function checkAnswer() {
            if (!isQuizActive || isWaitingResume) return;
            const lineData = currentSong.lyrics[currentLineIndex];
            const guess = userAnswer.value.trim();

            if (guess === lineData.computedKey) {
                statusMsg.style.color = "#1b5e20";
                statusMsg.innerText = "🎉 答對了！太厲害了！";
            } else {
                statusMsg.style.color = "#b71c1c";
                statusMsg.innerText = `❌ 答錯囉！正確答案是：${lineData.computedKey}`;
            }
            closeQuizAndResume(lineData);
        }

        function closeQuizAndResume(lineData) {
            isWaitingResume = true;
            userAnswer.disabled = true;
            submitBtn.disabled = true;
            lyricsDisplay.innerText = lineData.cleanText;
            inputZone.style.display = 'none';

            setTimeout(() => {
                statusMsg.innerText = "";
                isWaitingResume = false;
                isQuizActive = false;
                const endSec = parseTimeToSeconds(currentSong.endTime);
                if (audio.currentTime < endSec && !isFinished) {
                    audio.play().catch(() => {});
                }
            }, currentSong.resumeDelay);
        }
    </script>
</body>
</html>
